<html lang="en">

<head>
    <title>Modify Team</title>
    <link rel="stylesheet" href="../../style.css">
</head>

<body>
    <header>
        <span class="strong"><a href="../..">
                <p>ANK SIGNINGS</p>
            </a></span>
        <div class="signindiv">
            <button id="signinbutton" class="sendbutton"><strong>Sign In</strong></button>
            <p id="username"></p>
        </div>
    </header>
    <button id="backbutton" class="sendbutton" style="margin-top: 10px;">Cancel</button>
    <div class="bodydiv">
        <p id="mainLabel">Edit Team</p>
        <form id="form" action="/upload" method="POST" enctype="multipart/form-data">
            <input name="teamName" id="teamName" type="hidden">
            <label for="image">Club Logo:</label>
            <input name="image" id="image" type="file" accept="image/*">
            <p id="errorp" style="color:red;font-size: 15; display: none;">Image dimensions must be 300x300</p>
            <br>
            <label for="about">Club Name:</label>
            <input name="about" id="about" type="text">
            <br>
            <button id="send" class="sendbutton" style="margin-top: 10px;">Done</button>
        </form>
    </div>

    <script>
        async function changeClubName(payload) {
            const response = await fetch('/api/change-club-name', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // Check if the server actually returned JSON
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.indexOf("application/json") !== -1) {
                return await response.json();
            } else {
                const text = await response.text();
                console.error("Server returned HTML instead of JSON. Check your routes!", text);
            }
        }

        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const teamValue = urlParams.get("team");

        let teamName = document.getElementById("teamName");
        teamName.value = teamValue;

        // Inside your fetch("/api/teams") callback:
        fetch("/api/teams").then(response => response.json()).then(data => {
            let teamsjson = data;
            const currentTeam = teamsjson[teamValue];

            if (currentTeam.owner != localStorage.getItem("name")) {
                window.location.href = "..";
            }

            let mainLabel = document.getElementById("mainLabel");
            mainLabel.textContent = "Edit " + currentTeam.name;
            
            // Pre-fill the "About" input with the current name
            document.getElementById("about").value = currentTeam.name;
        });

        // Prevent form submission if the image isn't 300x300
        document.getElementById("form").addEventListener('submit', function (e) {
            const imageInput = document.getElementById("image");
            
            // Only validate if a new file was actually selected
            if (imageInput.files.length > 0 && !validImage) {
                e.preventDefault();
                alert("Please select a valid 300x300 image.");
            }
        });

        document.getElementById("backbutton").addEventListener('click', function () {
            window.location.href = "../?team=" + teamValue
        })

        document.getElementById("image").addEventListener('change', function () {
            const file = this.files[0];
            //console.log(file)
            const reader = new FileReader();
            reader.onload = function (e) {
                const img = new Image();
                img.src = e.target.result
                img.onload = function () {
                    let errorp = document.getElementById("errorp");
                    if (img.width !== 300 || img.height !== 300) {
                        errorp.style.display = "block";
                        validImage = false;
                    } else {
                        errorp.style.display = "none";
                        validImage = true;
                    }
                }
            }
            reader.readAsDataURL(file)
        })
    </script>
</body>

</html>
