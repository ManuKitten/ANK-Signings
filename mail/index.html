<html lang="en">
    <head>
        <title>ANK Mail</title>
    </head>
    <body>
        <button id="backbutton">Back</button>
        <h1>ANK Mails</h1>
        <button id="write">Write</button>
        <ul id="maillist"></ul>

        <script>
            document.getElementById("write").addEventListener('click', function() {
                window.location.href = "write"
            })

            function vigenere(text, key, encrypt = true) {
                let alphabet = " !#$'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]^_`abcdefghijklmnopqrstuvwxyz{|}~ñ";
                let result = '';
                let keyIndex = 0;
                for (let i = 0; i < text.length; i++) {
                    let textChar = text[i];
                    let keyChar = key[keyIndex];
                    let index;
                    if (encrypt) {
                        index = (alphabet.indexOf(textChar) + alphabet.indexOf(keyChar))%alphabet.length;
                    } else {
                        index = (alphabet.indexOf(textChar) - alphabet.indexOf(keyChar) + alphabet.length)%alphabet.length;
                    }
                    let char = alphabet[index];
                    result += char;
                    keyIndex = keyIndex % key.length;
                }
                return result;
            }

            const queryString = window.location.search;
            const urlParams = new URLSearchParams(queryString);
            const mailValue = urlParams.get("mail");

            fetch("../correspondence.json").then(response => response.json()).then(data => {
                let mails = data;
                if (mailValue == null || !Object.keys(mails[localStorage.getItem("name")]).includes(mailValue))
                    document.getElementById("backbutton").addEventListener('click', function() {
                        window.location.href = "../dashboard";
                    })
                    let personalmail = mails[localStorage.getItem("name")];
                    let ul = document.getElementById("maillist");
                    for (let i = 0; i < Object.keys(personalmail).length; i++) {
                        let li = document.createElement("li");
                        li.textContent = vigenere(personalmail[Object.keys(personalmail)[i]].about, localStorage.getItem("password"), false);
                        ul.appendChild(li);
                    }
            })
        </script>
    </body>
</html>
