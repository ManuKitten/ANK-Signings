        async function payDebtMoney(payload) {
            const response = await fetch('/api/pay-debt-money', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // Check if the server actually returned JSON
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.indexOf("application/json") !== -1) {
                return await response.json();
            } else {
                const text = await response.text();
                console.error("Server returned HTML instead of JSON. Check your routes!", text);
            }
        }

        function transferPlayer(player, team, caller, pay) {
            if (caller != undefined) {
                fetch("/api/teams").then(response => response.json()).then(data => {
                    let teamsjson = data;
                    for (let i = 0; i < Object.keys(teamsjson).length; i++) {
                        if (teamsjson[Object.keys(teamsjson)[i]].players.includes(player)) {
                            let oldTeamId = Object.keys(teamsjson)[i]
                            async function reDo(player, team, pay) {
                                if (pay != undefined) {
                                    let clickPayload = {
                                        userId: localStorage.getItem("name"),
                                        mailId: caller,
                                    }
                                    await changeMailClick(clickPayload);

                                    let payload = {
                                        teamId: oldTeamId,
                                        amount: pay,
                                        password: localStorage.getItem("password")
                                    }
                                    await payDebtMoney(payload);

                                    let config = {
                                        teamId: team,
                                        amount: pay
                                    }
                                    await addTeamDebt(config);

                                    let teamsjsonplayers = teamsjson[Object.keys(teamsjson)[i]].players;
                                    removalPlayers = teamsjsonplayers.filter(item => item !== player);
                                    let teamRemove = {
                                        teamId: Object.keys(teamsjson)[i],
                                        teamPlayers: removalPlayers
                                    };
                                    await updateTeam(teamRemove);

                                    teamsjsonplayers = teamsjson[team].players;
                                    teamsjsonplayers.push(player);
                                    let teamUpdate = {
                                        teamId: team,
                                        teamPlayers: teamsjsonplayers
                                    };
                                    await updateTeam(teamUpdate);

                                    let newPlayer = {
                                        playerId: player,
                                        newTeam: team
                                    };
                                    await playerTeam(newPlayer);

                                    fetch("/api/players").then(response => response.json()).then(playersjson => {
                                        async function main() {
                                            const random = "0123456789abcdef";
                                            let newValue = "nx";
                                            for (let j = 0; j < 6; j++) { newValue += random[Math.floor(Math.random() * 16)] }
                                            let addingNew = {
                                                newId: newValue,
                                                newData: {
                                                    name: teamsjson[team].name + " signs " + playersjson[player].name + " for " + pay + " million euros!",
                                                    desc: playersjson[player].name + " has today happily signed for the team " + teamsjson[team].name + ", leaving former team " + teamsjson[Object.keys(teamsjson)[i]].name + ", with a transaction of " + pay + " million euros. Player says he sees a bright future here.",
                                                    concern: {
                                                        teams: [team, Object.keys(teamsjson)[i]],
                                                        tournaments: []
                                                    }
                                                }
                                            };
                                            document.getElementsByTagName("button")[1].style.display = "none";
                                            await addNew(addingNew);

                                            window.location.href = "../mail"
                                        }
                                        main();
                                    })
                                }
                            }
                            reDo(player, team, pay)
                            break;
                        }
                    }
                })
            } else {
                window.location.href = "../mail"
            }
        }

        function vigenere(text, key, encrypt = true) {
            let alphabet = " !#$'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]^_`abcdefghijklmnopqrstuvwxyz{|}~ñáéíóúäëïöü";
            let result = '';
            let keyIndex = 0;
            for (let i = 0; i < text.length; i++) {
                let textChar = text[i]; let keyChar = key[keyIndex]; let index; if (encrypt) { index = (alphabet.indexOf(textChar) + alphabet.indexOf(keyChar)) % alphabet.length; } else {
                    index = (alphabet.indexOf(textChar) - alphabet.indexOf(keyChar) + alphabet.length) % alphabet.length;
                } let
                    char = alphabet[index]; result += char; keyIndex = (keyIndex + 1) % key.length;
            } return result;
        }
        const queryString = window.location.search;
        const urlParams = new URLSearchParams(queryString);
        const mailValue = urlParams.get("mail");

        async function decryptWithRSA(ciphertextB64, privateKeyJWK) {
            // 1. Convert Base64 ciphertext back to an ArrayBuffer
            const binaryString = window.atob(ciphertextB64);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }

            // 2. Import the private key (using n, e, and the decrypted d)
            const importedPrivateKey = await window.crypto.subtle.importKey(
                "jwk",
                privateKeyJWK,
                { name: "RSA-OAEP", hash: "SHA-256" },
                false,
                ["decrypt"]
            );

            // 3. Decrypt the data
            const decryptedBuffer = await window.crypto.subtle.decrypt(
                { name: "RSA-OAEP" },
                importedPrivateKey,
                bytes
            );

            return new TextDecoder().decode(decryptedBuffer);
        }

                            // Now replace lines 251 and 278 with:
                            (async () => {

                        const decryptedD = vigenere(userKeyData.privateKey, localStorage.getItem("password"), false);

                        // Now replace lines 251 and 278 with:

                        })

                        //set pcontent.textContent to rsa decrypted personalmail[mailValue].content with vigenere(keysjson[localStorage.getItem("name")], localStorage.getItem("password"), false)
                    }
                    author.appendChild(str);
                    bodydiv.appendChild(author)

                    for (let i = 0; i < 20; i++) {
                        pcontent.textContent = pcontent.textContent.replace("(enter)", "<br>");
                        pcontent.textContent = pcontent.textContent.replace("(quote)", '"');
                        pcontent.textContent = pcontent.textContent.replace("(euro)", '&euro;');
                    }
                    pcontent.innerHTML = pcontent.textContent;
                    if (pcontent.getElementsByTagName("button").length != 0) {
