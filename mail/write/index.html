<html lang="en">

<head>
    <title>Write Mail</title>
    <link rel="stylesheet" href="../../style.css">
</head>

<body>
    <header>
        <span class="strong"><a href="../..">
                <p>ANK SIGNINGS</p>
            </a></span>
        <div class="signindiv">
            <button id="signinbutton" class="sendbutton"><strong>Sign In</strong></button>
            <p id="username"></p>
        </div>
    </header>
    <button id="backbutton" class="sendbutton" style="margin-top: 10px;">Cancel</button>
    <div class="bodydiv">
        <p>Write Email</p>
        <form id="form">
            <label for="destiny">Destination:</label>
            <input name="destiny" id="destiny" type="text">
            <br>
            <label for="about">About:</label>
            <input name="about" id="about" type="text">
            <br>
            <label for="content">Content:</label>
            <input name="content" id="content" type="text">
            <br>
            <button id="send" class="sendbutton" style="margin-top: 10px;">Send</button>
        </form>
    </div>

    <script>
        async function sendMessage(payload) {
            const response = await fetch('/api/add-message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // Check if the server actually returned JSON
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.indexOf("application/json") !== -1) {
                return await response.json();
            } else {
                const text = await response.text();
                console.error("Server returned HTML instead of JSON. Check your routes!", text);
            }
        }

        if (localStorage.getItem("name") != null) {
            document.getElementById("signinbutton").style.display = "none";
            document.getElementById("username").textContent = localStorage.getItem("username");
        }
        function vigenere(text, key, encrypt = true) {
            let alphabet = " !#$'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]^_`abcdefghijklmnopqrstuvwxyz{|}~ñáéíóúäëïöü\"";
            let result = '';
            let keyIndex = 0;
            for (let i = 0; i < text.length; i++) {
                let textChar = text[i]; let keyChar = key[keyIndex]; let index; if (encrypt) { index = (alphabet.indexOf(textChar) + alphabet.indexOf(keyChar)) % alphabet.length; } else {
                    index = (alphabet.indexOf(textChar) - alphabet.indexOf(keyChar) + alphabet.length) % alphabet.length;
                } let
                    char = alphabet[index]; result += char; keyIndex = (keyIndex + 1) % key.length;
            } return result;
        }
        async function sha256(message) {
            // Encode the message as UTF-8
            const encoder = new TextEncoder();
            const data = encoder.encode(message);

            // Hash the data
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);

            // Convert ArrayBuffer to hex string
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray
                .map(b => b.toString(16).padStart(2, '0'))
                .join('');

            return hashHex;
        }

        let form = document.getElementById("form")
        form.addEventListener('submit', function (event) {
            event.preventDefault();
        });
        document.getElementById("backbutton").addEventListener('click', function () {
            window.location.href = "..";
        })

        // Helper to convert Base64URL to ArrayBuffer
        function base64UrlToBuffer(base64url) {
            const base64 = base64url.replace(/-/g, '+').replace(/_/g, '/');
            const binary = window.atob(base64);
            return Uint8Array.from(binary, c => c.charCodeAt(0));
        }

        async function encryptWithRSA(plaintext, publicKeyArray) {
            // Import the [n, e] components as an RSA Public Key
            const importedKey = await window.crypto.subtle.importKey(
                "jwk",
                {
                    kty: "RSA",
                    n: publicKeyArray[0],
                    e: publicKeyArray[1],
                    alg: "RSA-OAEP-256",
                    ext: true,
                },
                { name: "RSA-OAEP", hash: "SHA-256" },
                false,
                ["encrypt"]
            );

            const encoder = new TextEncoder();
            const data = encoder.encode(plaintext);
            const encrypted = await window.crypto.subtle.encrypt(
                { name: "RSA-OAEP" },
                importedKey,
                data
            );

            // Return as Base64 string to store in MongoDB
            return btoa(String.fromCharCode(...new Uint8Array(encrypted)));
        }

        fetch("/api/keys").then(response => response.json()).then(keysjson => {
            document.getElementById("send").addEventListener('click', async function () {
                const random = "0123456789abcdef";
                let mailValue = "ex";
                for (let i = 0; i < 6; i++) { mailValue += random[Math.floor(Math.random() * (16))]; }

                const destName = document.getElementById("destiny").value;
                const destHash = await sha256(destName);

                const recipientKeyData = keysjson[destHash];
                if (!recipientKeyData) {
                    alert("Recipient does not have registered encryption keys!");
                    return;
                }

                try {
                    // Encrypt using the recipient's public key [n, e]
                    const encryptedAbout = await encryptWithRSA(document.getElementById("about").value, recipientKeyData.publicKey);
                    const encryptedContent = await encryptWithRSA(document.getElementById("content").value, recipientKeyData.publicKey);
                    const encryptedSender = await encryptWithRSA(localStorage.getItem("username"), recipientKeyData.publicKey);

                    const payload = {
                        serverId: destHash,
                        messageId: mailValue,
                        messageData: {
                            about: encryptedAbout,
                            from: localStorage.getItem("name"),
                            // Sender name can stay Vigenere if it's just for the sender's own UI, 
                            // but usually, this is also encrypted for the recipient.
                            sender: encryptedSender,
                            content: encryptedContent,
                            newRsa: true,
                            isRSA: true // Flag to tell the UI to use RSA decryption
                        }
                    };

                    // Await the message sending so line 112 doesn't kill the request
                    await sendMessage(payload);
                    window.location.href = "..";
                } catch (err) {
                    console.error("Encryption/Send failed:", err);
                }
            });
        })
    </script>
</body>

</html>
