<html lang="en">
    <head>
        <title>Write Mail</title>
    </head>
    <body>
        <button id="backbutton">Cancel</button>
        <p>Write Email</p>
        <form id="form">
            <label for="destiny">Destination:</label>
            <input name="destiny" id="destiny" type="text">
            <br>
            <label for="about">About:</label>
            <input name="about" id="about" type="text">
            <br>
            <label for="content">Content:</label>
            <input name="content" id="content" type="text">
            <br>
            <button id="send">Send</button>
        </form>
        
        <script>
            function vigenere(text, key, encrypt = true) {
                let alphabet = " !#$'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]^_`abcdefghijklmnopqrstuvwxyz{|}~ñ";
                let result = '';
                let keyIndex = 0;
                for (let i = 0; i < text.length; i++) {
                    let textChar = text[i];
                    let keyChar = key[keyIndex];
                    let index;
                    if (encrypt) {
                        index = (alphabet.indexOf(textChar) + alphabet.indexOf(keyChar))%alphabet.length;
                    } else {
                        index = (alphabet.indexOf(textChar) - alphabet.indexOf(keyChar) + alphabet.length)%alphabet.length;
                    }
                    let char = alphabet[index];
                    result += char;
                    keyIndex = keyIndex % key.length;
                }
                return result;
            }
            async function sha256(message) {
                // Encode the message as UTF-8
                const encoder = new TextEncoder();
                const data = encoder.encode(message);

                // Hash the data
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);

                // Convert ArrayBuffer to hex string
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray
                    .map(b => b.toString(16).padStart(2, '0'))
                    .join('');

                return hashHex;
            }

            let form = document.getElementById("form")
            form.addEventListener('submit', function (event) {
                event.preventDefault();
            });
            document.getElementById("backbutton").addEventListener('click', function() {
                window.location.href = "..";
            })

            document.getElementById("send").addEventListener('click', function() {
                let store = {};
                const random = "0123456789abcdef";
                let mailValue = "ex";
                for (let i = 0; i < 6; i++) {
                    mailValue += random[Math.floor(Math.random()*(16))];
                }
                store[mailValue] = {
                    "step": 0,
                    "about": vigenere(document.getElementById("about").value, localStorage.getItem("password")),
                    "from": localStorage.getItem("name"),
                    "sender": localStorage.getItem("username"),
                    "content": vigenere(document.getElementById("content").value, localStorage.getItem("password")),
                }
                fetch("../../correspondence.json").then(response => response.json()).then(data => {
                    let mails = data;
                    sha256(document.getElementById("destiny").value).then(hash => {
                        mails[hash][mailValue] = {
                            "about": vigenere(document.getElementById("about").value, localStorage.getItem("password")),
                            "from": localStorage.getItem("name"),
                            "sender": localStorage.getItem("username"),
                            "content": vigenere(document.getElementById("content").value, localStorage.getItem("password")),
                            "step": 0
                        }
                        console.log(mails[hash]);
                    })
                })
            })
            

        </script>
    </body>
</html>
