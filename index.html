<html lang="en">

<head>
    <title>ANK Signings</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <span class="strong"><a href="">
                <p>ANK SIGNINGS</p>
            </a></span>
        <div class="signindiv">
            <button id="signinbutton" class="sendbutton"><strong>Sign In</strong></button>
            <p id="username"></p>
        </div>
    </header>
    <h1 class="h1-title">ANK Signings</h1>
    <div class="bodydiv">
        <p class="descp">Fantasy Football Manager to play with friends! ANK Signings is a fun place where you and your
            friends can imagine owning your very own football teams, signing players and winning trophies!</p>
        <div class="buttonsdiv">
            <button id="dashbutton" class="linkbutton" style="margin:0px;">Dashboard</button>
            <button id="playersbutton" class="linkbutton" style="margin:0px;">Players</button>
            <button id="teamsbutton" class="linkbutton" style="margin:0px;">Teams</button>
            <button id="tournamentsbutton" class="linkbutton" style="margin:0px;">Tournaments</button>
        </div>
        <br><br><br>
        <div id="newsDiv"></div>
    </div>

    <script>
        if (localStorage.getItem("name") != null) {
            document.getElementById("signinbutton").style.display = "none";
            document.getElementById("username").textContent = localStorage.getItem("username");
        }

        document.getElementById("dashbutton").addEventListener('click', function () {
            window.location.href = "dashboard";
        });
        document.getElementById("playersbutton").addEventListener('click', function () {
            window.location.href = "players";
        });
        document.getElementById("signinbutton").addEventListener('click', function () {
            window.location.href = "signin";
        });
        document.getElementById("teamsbutton").addEventListener('click', function () {
            window.location.href = "teams";
        });
        document.getElementById("tournamentsbutton").addEventListener('click', function () {
            window.location.href = "tournaments";
        });
        //Help paying debt
        async function addTeamDebt(payload) {
            const response = await fetch('/api/add-debt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // Check if the server actually returned JSON
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.indexOf("application/json") !== -1) {
                return await response.json();
            } else {
                const text = await response.text();
                console.error("Server returned HTML instead of JSON. Check your routes!", text);
            }
        }
        async function unpayDebt(payload) {
            const response = await fetch('/api/pay-debt-money', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // Check if the server actually returned JSON
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.indexOf("application/json") !== -1) {
                return await response.json();
            } else {
                const text = await response.text();
                console.error("Server returned HTML instead of JSON. Check your routes!", text);
            }
        }

        fetch("/api/teams").then(response => response.json()).then(data => {
            let teamsjson = data;
            for (let i = 0; i < Object.keys(teamsjson).length; i++) {
                let team = teamsjson[Object.keys(teamsjson)[i]];
                let currentTeamId = Object.keys(teamsjson)[i];
                if (team.owner == localStorage.getItem("name")) {
                    fetch("/api/debt").then(response => response.json()).then(data => {
                        let debt = data;
                        if (debt[Object.keys(teamsjson)[i]]["amount"] != 0) {
                            let unpay = {
                                teamId: currentTeamId,
                                amount: -1 * debt[Object.keys(teamsjson)[i]]["amount"],
                                password: localStorage.getItem("password")
                            }
                            unpayDebt(unpay);
                            console.log(debt);
                            console.log(Object.keys(teamsjson)[i]);
                            console.log(debt[Object.keys(teamsjson)[i]]["amount"]);
                            console.log(-1 * debt[Object.keys(teamsjson)[i]]["amount"]);
                            let tem = {
                                teamId: currentTeamId,
                                amount: -1 * debt[Object.keys(teamsjson)[i]]["amount"],
                            }
                            addTeamDebt(tem);
                        }
                    })
                }
            }
        })

        //Help Translating Mail
        function vigenere(text, key, encrypt = true) {
            let alphabet = " !#$'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ[]^_`abcdefghijklmnopqrstuvwxyz{|}~ñáéíóúäëïöü";
            let result = '';
            let keyIndex = 0;
            for (let i = 0; i < text.length; i++) {
                let textChar = text[i]; let keyChar = key[keyIndex]; let index; if (encrypt) { index = (alphabet.indexOf(textChar) + alphabet.indexOf(keyChar)) % alphabet.length; } else {
                    index = (alphabet.indexOf(textChar) - alphabet.indexOf(keyChar) + alphabet.length) % alphabet.length;
                } let
                    char = alphabet[index]; result += char; keyIndex = (keyIndex + 1) % key.length;
            } return result;
        }
        async function sendMessage(payload) {
            const response = await fetch('/api/add-message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // Check if the server actually returned JSON
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.indexOf("application/json") !== -1) {
                return await response.json();
            } else {
                const text = await response.text();
                console.error("Server returned HTML instead of JSON. Check your routes!", text);
            }
        }
        async function removeMessage(payload) {
            const response = await fetch('/api/remove-mail', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // Check if the server actually returned JSON
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.indexOf("application/json") !== -1) {
                return await response.json();
            } else {
                const text = await response.text();
                console.error("Server returned HTML instead of JSON. Check your routes!", text);
            }
        }

        fetch("/api/correspondence").then(response => response.json()).then(data => {
            const mails = data;
            const personalMails = mails[localStorage.getItem("name")];
            async function redoMail(i) {
                if (personalMails[Object.keys(personalMails)[i]].step == 0) {
                    const inMail = personalMails[Object.keys(personalMails)[i]]
                    const payload = {
                        serverId: inMail.from,
                        messageId: Object.keys(personalMails)[i],
                        messageData: {
                            step: 1,
                            about: vigenere(inMail.about, localStorage.getItem("password")),
                            from: localStorage.getItem("name"),
                            sender: vigenere(inMail.sender, localStorage.getItem("password")),
                            content: vigenere(inMail.content, localStorage.getItem("password")),
                            clicked: inMail.clicked
                        }
                    }
                    await sendMessage(payload);
                    const deletePayload = {
                        userId: localStorage.getItem("name"),
                        mailId: Object.keys(personalMails)[i]
                    }
                    await removeMessage(deletePayload);
                } else if (personalMails[Object.keys(personalMails)[i]].step == 1) {
                    const inMail = personalMails[Object.keys(personalMails)[i]]
                    const payload = {
                        serverId: inMail.from,
                        messageId: Object.keys(personalMails)[i],
                        messageData: {
                            about: vigenere(inMail.about, localStorage.getItem("password"), false),
                            from: localStorage.getItem("name"),
                            sender: vigenere(inMail.sender, localStorage.getItem("password"), false),
                            content: vigenere(inMail.content, localStorage.getItem("password"), false),
                            clicked: inMail.clicked
                        }
                    }
                    await sendMessage(payload);
                    const deletePayload = {
                        userId: localStorage.getItem("name"),
                        mailId: Object.keys(personalMails)[i]
                    }
                    await removeMessage(deletePayload);
                }
            }
            for (let i = 0; i < Object.keys(personalMails).length; i++) {
                redoMail(i);
            }
        })

        //Help adding keys
        async function addKeys(payload) {
            const response = await fetch('/api/add-keys', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            // Check if the server actually returned JSON
            const contentType = response.headers.get("content-type");
            if (contentType && contentType.indexOf("application/json") !== -1) {
                return await response.json();
            } else {
                const text = await response.text();
                console.error("Server returned HTML instead of JSON. Check your routes!", text);
            }
        }
        fetch("/api/keys").then(response => response.json()).then(async (keysjson) => {
            if (!keysjson[localStorage.getItem("name")]) {
                // 1. Generate the RSA-OAEP key pair
                const keyPair = await window.crypto.subtle.generateKey(
                    {
                        name: "RSA-OAEP",
                        modulusLength: 2048,
                        publicExponent: new Uint8Array([1, 0, 1]), // 65537
                        hash: "SHA-256",
                    },
                    true, 
                    ["encrypt", "decrypt"]
                );

                // 2. Export to JWK format to get raw components (n, e, d)
                const pubExport = await window.crypto.subtle.exportKey("jwk", keyPair.publicKey);
                const privExport = await window.crypto.subtle.exportKey("jwk", keyPair.privateKey);

                // 3. Encrypt the private key 'd' using your Vigenere (or better, AES)
                // Note: d is a sensitive string! 
                const encryptedD = vigenere(privExport.d, localStorage.getItem("password"));

                const keyObject = {
                    userId: localStorage.getItem("name"),
                    publicKey: [pubExport.n, pubExport.e], // Line 230-231: n and e
                    privateKey: encryptedD                // Line 232: encrypted d
                };

                await addKeys(keyObject);
                console.log("Keys generated and saved for", localStorage.getItem("name"));
            }
        });

        let newsDiv = document.getElementById("newsDiv");
        fetch("/api/news").then(response => response.json()).then(newsjson => {
            fetch("/api/teams").then(response => response.json()).then(teamsjson => {
                fetch("/api/tournaments").then(response => response.json()).then(toursjson => {
                    let concerningNews = [];
                    let flippedNews = Object.keys(newsjson);
                    flippedNews.reverse();
                    for (let i = 0; i < Object.keys(newsjson).length; i++) {
                        let newInfo = newsjson[flippedNews[i]];
                        let newConcern = newInfo.concern
                        let adding = false;
                        for (let t = 0; t < newConcern.teams.length; t++) {
                            if (teamsjson[newConcern.teams[t]].owner == localStorage.getItem("name")) {
                                adding = true;
                            }
                        }
                        if (!adding) {
                            for (let j = 0; j < newConcern.tournaments.length; j++) {
                                let tour = toursjson[newConcern.tournaments[j]]
                                let tourTeams = tour.teams;
                                for (let t = 0; t < tourTeams.length; t++) {
                                    if (teamsjson[tourTeams[t]].owner == localStorage.getItem("name")) {
                                        adding = true;
                                    }
                                }
                            }
                        }
                        if (adding) {
                            concerningNews.push(flippedNews[i])
                        }
                    }
                    concerningNews.forEach(newInfo => {
                        let reportDiv = document.createElement("div");
                        reportDiv.className = "reportDiv"
                        let title = document.createElement("h3");
                        title.textContent = newsjson[newInfo].name;
                        title.style.marginTop = "0px"
                        reportDiv.appendChild(title);
                        let p = document.createElement("p");
                        p.innerHTML = newsjson[newInfo].desc;
                        p.style.marginBottom = "0px"
                        reportDiv.appendChild(p);
                        newsDiv.appendChild(reportDiv);
                    })
                })
            })
        })
    </script>
</body>

</html>
